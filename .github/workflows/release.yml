name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact_name: macos-aarch64
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            artifact_name: macos-x86_64
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            artifact_name: linux-x86_64
            args: ""
          - platform: windows-latest
            artifact_name: windows-x86_64
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Sync app version from git tag
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          export RELEASE_VERSION="${RELEASE_VERSION#v}"
          node -e "const fs=require('fs'); const version=process.env.RELEASE_VERSION; const updateJson=(file)=>{const data=JSON.parse(fs.readFileSync(file,'utf8')); data.version=version; fs.writeFileSync(file, JSON.stringify(data, null, 2)+'\n');}; updateJson('package.json'); updateJson('package-lock.json'); updateJson('src-tauri/tauri.conf.json'); const cargoPath='src-tauri/Cargo.toml'; let cargo=fs.readFileSync(cargoPath,'utf8'); cargo=cargo.replace(/(^version\s*=\s*\")[^\"]+(\"\s*$)/m, (_,prefix,suffix)=>prefix+version+suffix); fs.writeFileSync(cargoPath,cargo);"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build app bundles
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/**/release/bundle/**
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "13 Colonies Logger ${{ github.ref_name }}"
          body: "See the assets below to download the installer for your platform."
          draft: true
          prerelease: false
          files: |
            artifacts/**/bundle/msi/*.msi
            artifacts/**/bundle/nsis/*.exe
            artifacts/**/bundle/dmg/*.dmg
            artifacts/**/bundle/macos/*.app.tar.gz
            artifacts/**/bundle/deb/*.deb
            artifacts/**/bundle/rpm/*.rpm
            artifacts/**/bundle/appimage/*.AppImage
